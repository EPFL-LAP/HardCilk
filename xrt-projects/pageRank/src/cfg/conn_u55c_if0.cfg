[connectivity]
nk=cmac_0:1:cmac_0
nk=networklayer:1:networklayer_0

nk=pageRank_0:1:pageRank_0


#Connect Network Layer to CMAC DO NOT CHANGE
stream_connect=cmac_0.M_AXIS:networklayer_0.S_AXIS_eth2nl
stream_connect=networklayer_0.M_AXIS_nl2eth:cmac_0.S_AXIS


# Connect PageRank to Network layer
stream_connect=pageRank_0.m_axis_mFPGA:networklayer_0.S_AXIS_sk2nl
stream_connect=networklayer_0.M_AXIS_nl2sk:pageRank_0.s_axis_mFPGA


sp=pageRank_0.m_axi_00:HBM[0:31]
sp=pageRank_0.m_axi_01:HBM[0:31]
sp=pageRank_0.m_axi_02:HBM[0:31]
sp=pageRank_0.m_axi_03:HBM[0:31]

[clock]
freqHz=170000000:pageRank_0.clock
freqHz=170000000:cmac_0.ap_clk
freqHz=100000000:cmac_0.clk_gt_freerun

[advanced]
param=compiler.userPostSysLinkOverlayTcl=/beta/shahawy/mfpga_ws/VNx/xup_vitis_network_example/Ethernet/post_sys_link.tcl

[vivado]
prop=run.impl_1.strategy=Performance_NetDelay_low